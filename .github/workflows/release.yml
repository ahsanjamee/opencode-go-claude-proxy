name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write   # needed for GHCR push

env:
  DOCKER_HUB_IMAGE: ahsanjamee/opencode-go-claude-proxy
  GHCR_IMAGE: ghcr.io/ahsanjamee/opencode-go-claude-proxy

jobs:
  # ─────────────────────────────────────────────
  # Build standalone binaries via pkg
  # ─────────────────────────────────────────────
  binaries:
    name: Build binary (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-x64
            runner: ubuntu-latest
            target: node20-linux-x64
            artifact: opencode-go-proxy-linux-x64
          - os: linux-arm64
            runner: ubuntu-latest
            target: node20-linux-arm64
            artifact: opencode-go-proxy-linux-arm64
          - os: macos-x64
            runner: macos-latest
            target: node20-macos-x64
            artifact: opencode-go-proxy-macos-x64
          - os: macos-arm64
            runner: macos-latest
            target: node20-macos-arm64
            artifact: opencode-go-proxy-macos-arm64
          - os: win-x64
            runner: windows-latest
            target: node20-win-x64
            artifact: opencode-go-proxy-win-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Package binary
        run: |
          npx pkg dist/index.js \
            --targets ${{ matrix.target }} \
            --output bin/${{ matrix.artifact }} \
            --config package.json

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.artifact }}

  # ─────────────────────────────────────────────
  # Build & push Docker image to GHCR + Docker Hub
  # ─────────────────────────────────────────────
  docker:
    name: Docker image (GHCR + Docker Hub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate tags for both registries from the git tag
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_HUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push to GHCR + Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Update Docker Hub repo description from README
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_HUB_IMAGE }}
          readme-filepath: ./README.md

  # ─────────────────────────────────────────────
  # Publish to npm
  # ─────────────────────────────────────────────
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─────────────────────────────────────────────
  # Create GitHub Release with all binary assets
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [binaries, docker, npm-publish]
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: Create Release with binaries
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            **npx (no install needed):**
            ```bash
            npx opencode-go-claude-proxy --api-key sk-YOUR-KEY
            ```

            **Docker:**
            ```bash
            docker run -p 3456:3456 -e OPENCODE_API_KEY=sk-YOUR-KEY ahsanjamee/opencode-go-claude-proxy:latest
            ```

            **Binary** — download the file for your platform below, make it executable, and run it directly.
          files: bin/*
