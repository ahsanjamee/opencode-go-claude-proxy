name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Verify dist entrypoint
        run: node dist/index.js --help 2>&1 | grep -q "Usage" && echo "OK" || echo "No --help output (fine)"
